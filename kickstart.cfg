# ============================================
# RHEL 9.6 Kickstart - Toolset Build
# ============================================
cdrom
text
poweroff
firstboot --disable

# -------------------------------------------
# Language and Regional Settings
# -------------------------------------------
lang en_US.UTF-8
keyboard --vckeymap=tr --xlayouts='en'
timezone Europe/Istanbul --isUtc

# -------------------------------------------
# Security
# -------------------------------------------
selinux --disabled
firewall --disabled

# -------------------------------------------
# Hostname
# -------------------------------------------
network --hostname=localhost

# -------------------------------------------
# Root Password
# -------------------------------------------
rootpw --plaintext admin1213

# -------------------------------------------
# Kdump
# -------------------------------------------
%addon com_redhat_kdump --enable --reserve-mb='256'
%end

# -------------------------------------------
# OS Disk Auto-Detection
# -------------------------------------------
# Selection logic:
#   HPE  -> RAID-1 480GB  -> sda
#   Dell -> BOSS-N1 447GB -> nvme0n1  (data RAID-5 smaller than sda)
# Selects the smallest disk under 800 GiB
%pre --interpreter=/bin/bash --log=/tmp/ks-pre.log

THRESHOLD=858993459200   # 800 GiB (bytes)
BEST_DISK=""
BEST_SIZE=9999999999999999

while read -r NAME SIZE TYPE; do
    [[ "$TYPE" != "disk" ]] && continue
    [[ "$NAME" == zram* ]] && continue
    [[ "$NAME" == loop* ]] && continue
    [[ "$NAME" == sr* ]]   && continue
    [[ "$SIZE" -eq 0 ]] && continue
    [[ "$SIZE" -lt 1073741824 ]] && continue
    [[ "$SIZE" -ge "$THRESHOLD" ]] && continue
    if [[ "$SIZE" -lt "$BEST_SIZE" ]]; then
        BEST_SIZE=$SIZE
        BEST_DISK=$NAME
    fi
done < <(lsblk -d -b -o NAME,SIZE,TYPE --noheadings 2>/dev/null)

if [[ -z "$BEST_DISK" ]]; then
    BEST_DISK="sda"
    echo "WARNING: No disk under 800GiB found, falling back to sda." >> /tmp/ks-pre.log
fi

echo "Selected OS disk: ${BEST_DISK} (${BEST_SIZE} bytes)" >> /tmp/ks-pre.log

cat > /tmp/disk.cfg << DISKEOF
ignoredisk --only-use=${BEST_DISK}
clearpart --all --initlabel --drives=${BEST_DISK}
bootloader --timeout=5 --boot-drive=${BEST_DISK}
part /boot     --fstype="xfs" --size=2048 --ondisk=${BEST_DISK}
part /boot/efi --fstype="efi" --size=2048 --fsoptions="umask=0077,shortname=winnt" --ondisk=${BEST_DISK}
part pv.01     --grow --size=1 --ondisk=${BEST_DISK}
DISKEOF
%end

# -------------------------------------------
# OS Disk Configuration (dynamic - included from %pre)
# -------------------------------------------
zerombr
%include /tmp/disk.cfg

# LVM
volgroup rootvg pv.01

# Logical Volumes
logvol /           --fstype="xfs"  --size=16384  --name=rootlv   --vgname=rootvg
logvol /var        --fstype="xfs"  --size=32768  --name=varlv    --vgname=rootvg
logvol /home       --fstype="xfs"  --size=8192   --name=homelv   --vgname=rootvg
logvol /tmp        --fstype="xfs"  --size=8192   --name=tmplv    --vgname=rootvg
logvol /opt        --fstype="xfs"  --size=16384  --name=optlv    --vgname=rootvg
logvol /var/crash  --fstype="xfs"  --size=131072 --name=dumplv   --vgname=rootvg
logvol /usr/openv  --fstype="xfs"  --size=10240  --name=openvlv  --vgname=rootvg
logvol /var/seclog --fstype="xfs"  --size=20480  --name=seclv    --vgname=rootvg
logvol swap        --fstype="swap" --size=4096   --name=swaplv   --vgname=rootvg

# -------------------------------------------
# Packages
# -------------------------------------------
%packages --ignoremissing
@^server-product-environment
@hardware-monitoring
@network-file-system-client
@performance-tools
@development-tools
@system-tools
telnet
tcpdump
nano
vim-enhanced
ethtool
net-tools
ipmitool
net-snmp
perl
pcp
%end

# ============================================
# Post Installation
# ============================================
%post --log=/root/ks-post.log

# -------------------------------------------
# SSH Root Login
# -------------------------------------------
sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
sed -i 's/^PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config

# -------------------------------------------
# Ansible-Postinstall SSH Key
# -------------------------------------------
mkdir -p /root/.ssh
chmod 700 /root/.ssh
echo "ssh-ed25519 AAABB3NzaDDlZDI1NTE5aTRFdOyGBBSM2avisdYUTclAxlq+KGrtAqRv/F8vd0lYtlSJ sshkey ansible-ssh" >> /root/.ssh/authorized_keys
chmod 600 /root/.ssh/authorized_keys

# -------------------------------------------
# Disable Unnecessary Services
# -------------------------------------------
systemctl disable --now firewalld || true
systemctl disable --now pmlogger


# -------------------------------------------
# Network Port Discovery Tool
# -------------------------------------------
cat << 'SCRIPTEOF' > /root/detect_ports.sh
#!/bin/bash
{
echo "=========================================================="
echo "NETWORK PORT DISCOVERY (LLDP/CDP)"
echo "=========================================================="

UP_INTERFACES=$(ip -br link show | awk '$2 == "UP" {print $1}' | grep -v -E "lo|bond|virbr")

if [ -z "$UP_INTERFACES" ]; then
    echo "ERROR: No physical interface with LINK UP found!"
    exit 1
fi

declare -A PIDS
for IFACE in $UP_INTERFACES; do
    timeout 35 tcpdump -nn -vv -i $IFACE -s 1500 -c 1 \
        '(ether[12:2]=0x88cc or ether[20:2]=0x2000)' 2>/dev/null > /tmp/tcpdump_${IFACE} &
    PIDS[$IFACE]=$!
done

for IFACE in $UP_INTERFACES; do
    wait ${PIDS[$IFACE]}
    echo -e "\nScanning Interface: $IFACE"
    echo "----------------------------------------------------------"
    if [ -s /tmp/tcpdump_${IFACE} ]; then
        echo "SUCCESS: DATA FOUND ON [$IFACE]:"
        cat /tmp/tcpdump_${IFACE}
    else
        echo "WARNING: No LLDP/CDP packet captured on $IFACE. (Check Switch Config)"
    fi
    rm -f /tmp/tcpdump_${IFACE}
done

echo -e "\n=========================================================="
echo "Discovery finished. Master Build is Ready."
} 2>&1 | less -S
SCRIPTEOF

sed -i 's/\r$//' /root/detect_ports.sh
chmod +x /root/detect_ports.sh

# -------------------------------------------
# Bond Setup Tool
# -------------------------------------------
cat << 'BONDEOF' > /root/bond_setup.sh
#!/bin/bash

# ============================================
# BOND SETUP TOOL
# ============================================

RED='\033[0;31m'
GREEN='\033[0;32m'
YELLOW='\033[1;33m'
CYAN='\033[0;36m'
NC='\033[0m'

validate_iface() {
    local IFACE=$1
    if ! ip link show "$IFACE" &>/dev/null; then
        echo -e "${RED}ERROR: Interface '$IFACE' not found on system.${NC}"
        return 1
    fi
    return 0
}

create_bond() {
    local BOND_NAME=$1
    local BOND_LABEL=$2
    local REQUIRE_GW=$3

    echo -e "\n${CYAN}--- ${BOND_NAME} (${BOND_LABEL}) Setup ---${NC}"

    if nmcli con show "$BOND_NAME" &>/dev/null; then
        echo -e "${RED}ERROR: Connection '$BOND_NAME' already exists.${NC}"
        echo -e "${YELLOW}To remove: nmcli con delete ${BOND_NAME}${NC}"
        return
    fi

    read -p "Select mode [lacp/active-backup]: " MODE
    while [[ "$MODE" != "lacp" && "$MODE" != "active-backup" ]]; do
        echo -e "${RED}Invalid mode. Enter 'lacp' or 'active-backup'.${NC}"
        read -p "Select mode [lacp/active-backup]: " MODE
    done

    read -p "Interface 1: " IF1
    validate_iface "$IF1" || return

    read -p "Interface 2: " IF2
    validate_iface "$IF2" || return

    if [[ "$IF1" == "$IF2" ]]; then
        echo -e "${RED}ERROR: Interface 1 and Interface 2 cannot be the same.${NC}"
        return
    fi

    read -p "IP/Prefix [e.g. xx.xx.xx.xx/subnet]: " IP

    if [[ "$REQUIRE_GW" == "yes" ]]; then
        read -p "Gateway [e.g. xx.xx.xx.xx]: " GW
        while [[ -z "$GW" ]]; do
            echo -e "${RED}Gateway is required for ${BOND_NAME}.${NC}"
            read -p "Gateway: " GW
        done
    else
        read -p "Gateway [leave empty=none]: " GW
    fi

    echo -e "\n${YELLOW}--- Summary ---${NC}"
    echo "  Bond     : $BOND_NAME"
    echo "  Mode     : $MODE"
    echo "  Slave 1  : $IF1"
    echo "  Slave 2  : $IF2"
    echo "  IP/Prefix: $IP"
    echo "  Gateway  : ${GW:-none}"
    echo ""
    read -p "Continue? [y/n]: " CONFIRM
    if [[ "$CONFIRM" != "y" && "$CONFIRM" != "Y" ]]; then
        echo -e "${YELLOW}Cancelled.${NC}"
        return
    fi

    echo -e "\n${YELLOW}Applying...${NC}"

    if [[ "$MODE" == "lacp" ]]; then
        if ! nmcli con add type bond con-name "$BOND_NAME" ifname "$BOND_NAME" \
            bond.options "mode=802.3ad,miimon=100,lacp_rate=fast,xmit_hash_policy=layer2+3"; then
            echo -e "${RED}ERROR: Failed to create bond.${NC}"; return
        fi
    else
        if ! nmcli con add type bond con-name "$BOND_NAME" ifname "$BOND_NAME" \
            bond.options "mode=active-backup,miimon=100,primary=$IF1"; then
            echo -e "${RED}ERROR: Failed to create bond.${NC}"; return
        fi
    fi

    if [[ -n "$GW" ]]; then
        if ! nmcli con modify "$BOND_NAME" ipv4.addresses "$IP" ipv4.gateway "$GW" \
            ipv4.method manual connection.autoconnect yes; then
            echo -e "${RED}ERROR: Failed to configure IP.${NC}"; return
        fi
    else
        if ! nmcli con modify "$BOND_NAME" ipv4.addresses "$IP" \
            ipv4.method manual connection.autoconnect yes; then
            echo -e "${RED}ERROR: Failed to configure IP.${NC}"; return
        fi
    fi

    if ! nmcli con add type ethernet con-name "${BOND_NAME}-slave1" ifname "$IF1" master "$BOND_NAME"; then
        echo -e "${RED}ERROR: Failed to add Slave1.${NC}"; return
    fi
    if ! nmcli con add type ethernet con-name "${BOND_NAME}-slave2" ifname "$IF2" master "$BOND_NAME"; then
        echo -e "${RED}ERROR: Failed to add Slave2.${NC}"; return
    fi

    if ! nmcli con up "$BOND_NAME"; then
        echo -e "${RED}ERROR: Failed to bring up bond.${NC}"; return
    fi

    echo -e "${GREEN}[OK] ${BOND_NAME} configured.${NC}"
    echo -e "\n${CYAN}--- Bond Status ---${NC}"
    ip addr show "$BOND_NAME"
}

main_menu() {
    while true; do
        echo -e "\n${CYAN}=========================================================="
        echo "         BOND SETUP TOOL"
        echo -e "==========================================================${NC}"
        echo "Which bond do you want to configure?"
        echo ""
        echo "  1) bond-data0  (DATA0)"
        echo "  2) bond-data1  (DATA1)"
        echo "  3) bond-bck    (BACKUP)"
        echo "  4) bond-rep    (REPLICATION)"
        echo "  5) bond-nas    (NAS)"
        echo "  6) bond-hb     (HEARTBEAT)"
        echo "  q) Exit"
        echo ""
        read -p "Your choice: " CHOICE

        case "$CHOICE" in
            1) create_bond "bond-data0" "DATA0"       "yes" ;;
            2) create_bond "bond-data1" "DATA1"       "yes" ;;
            3) create_bond "bond-bck"   "BACKUP"      "no"  ;;
            4) create_bond "bond-rep"   "REPLICATION" "no"  ;;
            5) create_bond "bond-nas"   "NAS"         "no"  ;;
            6) create_bond "bond-hb"    "HEARTBEAT"   "no"  ;;
            q|Q)
                echo -e "\n${GREEN}Exiting. Bond configuration complete.${NC}\n"
                exit 0
                ;;
            *)
                echo -e "${RED}Invalid selection.${NC}"
                ;;
        esac
    done
}

main_menu
BONDEOF

sed -i 's/\r$//' /root/bond_setup.sh
chmod +x /root/bond_setup.sh

%end

# -------------------------------------------
# Eject Media (nochroot - runs in installer environment)
# -------------------------------------------
%post --nochroot
eject /dev/sr0 || true
%end
